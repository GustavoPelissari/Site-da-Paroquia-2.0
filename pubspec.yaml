name: paroquia_mvp
description: MVP mobile da Paroquia em Flutter
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - web-next/public/img/IMAGEM DE SÃO PAULO APOSTOLO MONOCROMATICA.png
    - web-next/public/img/IMAGEM DA PAROQUIA.jpeg
